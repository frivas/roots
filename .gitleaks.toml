[allowlist]
  description = "Known false positives and already-remediated historical findings"

  # Baseline files themselves contain hashed secret values — scanning them
  # creates circular false positives. The actual secrets they reference have
  # already been reviewed and accepted or remediated.
  paths = [
    '''(^|/)gitleaks-baseline\.json$''',
    '''(^|/)\.secrets\.baseline$''',
  ]

  # Historical commits where App.tsx contained real secrets. Those secrets
  # were removed in subsequent commits and have been rotated. Allowlisting
  # the commits so full-history scans don't keep re-reporting them.
  commits = [
    "122af92daf123aee07dbaf277107e5d793c5e2ac",
    "36e108be85166b4dcf3d6a50c0c2987c118f6f8d",
  ]
