name: Security Audit

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 9 * * 1' # Monday 9am UTC

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Audit frontend
        run: |
          # GHSA-qjx8-664m-686j: js-cookie prototype hijack via @clerk/shared@4.x (exact-pinned 3.0.5).
          # @clerk/shared hard-pins js-cookie@3.0.5 and npm overrides cannot override exact pins.
          # Remove this exemption once @clerk/shared ships js-cookie>=3.0.6.
          EXEMPT="GHSA-qjx8-664m-686j"
          if ! npm audit --workspace=frontend --omit=dev --json > /tmp/audit-fe.json 2>&1; then
            UNACCEPTABLE=$(jq --arg e "$EXEMPT" '
              [.vulnerabilities | to_entries[] | .value |
               select(.severity == "high" or .severity == "critical") |
               .via[] | select(type == "object") |
               select(.url | test($e) | not)] | length
            ' /tmp/audit-fe.json)
            if [ "$UNACCEPTABLE" -gt 0 ]; then cat /tmp/audit-fe.json; exit 1; fi
            echo "Audit: only exempt advisory $EXEMPT found — pending upstream @clerk/shared fix"
          fi
      - name: Audit backend
        run: |
          EXEMPT="GHSA-qjx8-664m-686j"
          if ! npm audit --workspace=backend --omit=dev --json > /tmp/audit-be.json 2>&1; then
            UNACCEPTABLE=$(jq --arg e "$EXEMPT" '
              [.vulnerabilities | to_entries[] | .value |
               select(.severity == "high" or .severity == "critical") |
               .via[] | select(type == "object") |
               select(.url | test($e) | not)] | length
            ' /tmp/audit-be.json)
            if [ "$UNACCEPTABLE" -gt 0 ]; then cat /tmp/audit-be.json; exit 1; fi
            echo "Audit: only exempt advisory $EXEMPT found — pending upstream @clerk/shared fix"
          fi

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Check licenses
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0"
